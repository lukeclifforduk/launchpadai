<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Industrial Mine Simulation — Train & Cargo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0905;
      color: #d0c8b8;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #gameContainer {
      display: flex;
      width: 1400px;
      height: 700px;
      background: #1a1815;
      border: 2px solid #4a3a2a;
    }

    #gameCanvas {
      width: 1200px;
      height: 700px;
      flex: none;
      background: #2a251f;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #sidebar {
      width: 200px;
      background: #0f0d0a;
      border-left: 3px solid #4a3a2a;
      padding: 10px;
      overflow-y: auto;
      font-size: 9px;
      line-height: 1.4;
      color: #b8b0a0;
      flex: none;
    }

    #sidebar::-webkit-scrollbar {
      width: 5px;
    }

    #sidebar::-webkit-scrollbar-track {
      background: #1a1815;
    }

    #sidebar::-webkit-scrollbar-thumb {
      background: #4a3a2a;
      border-radius: 2px;
    }

    .section {
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #3a2a1a;
    }

    .section:last-child {
      border-bottom: none;
    }

    .section h3 {
      font-size: 10px;
      font-weight: bold;
      color: #b8a878;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-bottom: 1px solid #3a3020;
      padding-bottom: 2px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
      font-size: 8px;
    }

    .stat-label {
      color: #8a7a68;
      flex: 1;
    }

    .stat-value {
      color: #d8d0c0;
      font-weight: bold;
      text-align: right;
      flex: 0 0 70px;
    }

    .progress-bar {
      background: #1a1815;
      height: 8px;
      margin: 3px 0;
      border: 1px solid #3a2a1a;
      overflow: hidden;
      border-radius: 2px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b6f47, #c4a870);
      transition: width 0.1s linear;
    }

    .carriage-bar {
      background: #0f0d0a;
      height: 6px;
      margin: 1px 0;
      border: 1px solid #2a2015;
      overflow: hidden;
      border-radius: 1px;
    }

    .carriage-fill {
      height: 100%;
      background: #a87a3a;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="sidebar">
      <!-- Train Status Section -->
      <div class="section">
        <h3>🚂 Train</h3>
        <div class="stat-row">
          <span class="stat-label">State:</span>
          <span class="stat-value" id="trainState">DOCKED</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Loc:</span>
          <span class="stat-value" id="trainLoc">A</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Speed:</span>
          <span class="stat-value" id="trainSpeed">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Cargo:</span>
          <span class="stat-value" id="trainCargo">0/40</span>
        </div>
      </div>

      <!-- Carriages Section -->
      <div class="section">
        <h3>📦 Carriages</h3>
        <div id="carriagesList"></div>
      </div>

      <!-- Quarry Levels Section -->
      <div class="section">
        <h3>⛏️ Quarries</h3>
        <div style="margin-bottom: 4px;">
          <div class="stat-row" style="margin-bottom: 2px;">
            <span class="stat-label">Top:</span>
            <span class="stat-value" id="quarryALevel">100%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="quarryABar" style="width: 100%;"></div>
          </div>
        </div>
        <div>
          <div class="stat-row" style="margin-bottom: 2px;">
            <span class="stat-label">Bot:</span>
            <span class="stat-value" id="quarryBLevel">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="quarryBBar" style="width: 0%;"></div>
          </div>
        </div>
      </div>

      <!-- Truck Status Section -->
      <div class="section">
        <h3>🚛 Trucks</h3>
        <div style="margin-bottom: 4px;">
          <div class="stat-row">
            <span class="stat-label">Top:</span>
            <span class="stat-value" id="trucksAStatus">idle</span>
          </div>
        </div>
        <div>
          <div class="stat-row">
            <span class="stat-label">Bot:</span>
            <span class="stat-value" id="trucksBStatus">idle</span>
          </div>
        </div>
      </div>

      <!-- Metrics Section -->
      <div class="section">
        <h3>📊 Metrics</h3>
        <div class="stat-row">
          <span class="stat-label">Ore/min:</span>
          <span class="stat-value" id="metricsOreMoved">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Cycles:</span>
          <span class="stat-value" id="metricsCycles">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Time:</span>
          <span class="stat-value" id="metricsTime">0:00</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Flow:</span>
          <span class="stat-value" id="metricsFlow">A→B</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ===== CANVAS SETUP ===== */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1200;
    canvas.height = 700;

    /* ===== CONSTANTS ===== */
    const CANVAS_W = 1200, CANVAS_H = 700;
    const CELL = 16; // terrain tile size

    // Oval track (rounded rectangle)
    const TK = {
      LEFT: 150,
      RIGHT: 1050,
      TOP: 100,
      BOTTOM: 600,
      RADIUS: 100
    };

    const CRUISE_SPEED = 52.95;  // px/sec
    const ACCEL_DIST = 150;      // px for accel/decel ramp

    // Station locations (pixel coords on track)
    const STATION_A = { x: 300, y: 100 };   // top straight
    const STATION_B = { x: 900, y: 600 };  // bottom straight

    // Quarries (pixel coords + grid size) - enlarged to 30px cells
    const QUARRY_A = { x: 150, y: 120, cols: 10, rows: 8, cellSize: 30 };   // upper-left
    const QUARRY_B = { x: 850, y: 380, cols: 10, rows: 8, cellSize: 30 };   // lower-right

    // Cranes
    const CRANE_A = { x: 300, baseY: 85 };
    const CRANE_B = { x: 900, baseY: 580 };

    const CARRIAGE_COUNT = 5;
    const CARRIAGE_CAPACITY = 8;
    const CARRIAGE_SPACING = 32;  // px center-to-center

    const DWELL_TIME = 9.0;        // seconds
    const TRUCK_SPEED = 33;        // px/sec (50% faster than original 22)
    const TRUCKS_PER_STATION = 3;
    const DAY_CYCLE_SECS = 120.0;

    const MAX_QUARRY_ORE = 640;    // 10×8×8
    const EMPTY_THRESHOLD = 32;    // ~5%
    const FULL_THRESHOLD = 608;    // ~95%

    // Road waypoints - oval circuits with pullover areas
    const ROAD_A = [
      // Approach from top
      { x: 300, y: 85 },        // Station entrance
      { x: 300, y: 140 },       // Move down
      // Left side going down
      { x: 100, y: 140 },       // Left turn
      { x: 100, y: 370 },       // Left side pullover area
      // Bottom going right
      { x: 500, y: 370 },       // Bottom right corner
      { x: 500, y: 140 },       // Right side pullover area
      // Top right back to station
      { x: 300, y: 140 },       // Back to approach
      { x: 300, y: 85 }         // Station exit
    ];

    const ROAD_B = [
      // Approach from bottom
      { x: 900, y: 620 },       // Station entrance
      { x: 900, y: 570 },       // Move up
      // Right side going up
      { x: 1100, y: 570 },      // Right turn
      { x: 1100, y: 340 },      // Right side pullover area
      // Top going left
      { x: 600, y: 340 },       // Top left corner
      { x: 600, y: 570 },       // Left side pullover area
      // Bottom left back to station
      { x: 900, y: 570 },       // Back to approach
      { x: 900, y: 620 }        // Station exit
    ];

    /* ===== PATH SYSTEM ===== */
    let PATH_WAYPOINTS = [];
    let PATH_CUMULATIVE = [];
    let PATH_LENGTH = 0;
    let STATION_A_DIST = 0;
    let STATION_B_DIST = 0;

    function buildPath() {
      PATH_WAYPOINTS = [];

      // 8 segments of the oval

      // Top straight: left to right, y = TK.TOP
      for (let x = TK.LEFT; x <= TK.RIGHT; x += 1) {
        PATH_WAYPOINTS.push({ x, y: TK.TOP });
      }

      // Top-right arc: center at (TK.RIGHT - TK.RADIUS, TK.TOP + TK.RADIUS)
      const arcTR = { cx: TK.RIGHT - TK.RADIUS, cy: TK.TOP + TK.RADIUS };
      for (let angle = 0; angle <= Math.PI / 2; angle += 0.01) {
        const x = arcTR.cx + TK.RADIUS * Math.cos(angle);
        const y = arcTR.cy - TK.RADIUS * Math.sin(angle);
        PATH_WAYPOINTS.push({ x, y });
      }

      // Right straight: top to bottom, x = TK.RIGHT
      for (let y = TK.TOP + TK.RADIUS; y <= TK.BOTTOM - TK.RADIUS; y += 1) {
        PATH_WAYPOINTS.push({ x: TK.RIGHT, y });
      }

      // Bottom-right arc: center at (TK.RIGHT - TK.RADIUS, TK.BOTTOM - TK.RADIUS)
      const arcBR = { cx: TK.RIGHT - TK.RADIUS, cy: TK.BOTTOM - TK.RADIUS };
      for (let angle = 0; angle <= Math.PI / 2; angle += 0.01) {
        const x = arcBR.cx + TK.RADIUS * Math.sin(angle);
        const y = arcBR.cy + TK.RADIUS * Math.cos(angle);
        PATH_WAYPOINTS.push({ x, y });
      }

      // Bottom straight: right to left, y = TK.BOTTOM
      for (let x = TK.RIGHT; x >= TK.LEFT; x -= 1) {
        PATH_WAYPOINTS.push({ x, y: TK.BOTTOM });
      }

      // Bottom-left arc: center at (TK.LEFT + TK.RADIUS, TK.BOTTOM - TK.RADIUS)
      const arcBL = { cx: TK.LEFT + TK.RADIUS, cy: TK.BOTTOM - TK.RADIUS };
      for (let angle = 0; angle <= Math.PI / 2; angle += 0.01) {
        const x = arcBL.cx - TK.RADIUS * Math.cos(angle);
        const y = arcBL.cy + TK.RADIUS * Math.sin(angle);
        PATH_WAYPOINTS.push({ x, y });
      }

      // Left straight: bottom to top, x = TK.LEFT
      for (let y = TK.BOTTOM - TK.RADIUS; y >= TK.TOP + TK.RADIUS; y -= 1) {
        PATH_WAYPOINTS.push({ x: TK.LEFT, y });
      }

      // Top-left arc: center at (TK.LEFT + TK.RADIUS, TK.TOP + TK.RADIUS)
      const arcTL = { cx: TK.LEFT + TK.RADIUS, cy: TK.TOP + TK.RADIUS };
      for (let angle = 0; angle <= Math.PI / 2; angle += 0.01) {
        const x = arcTL.cx - TK.RADIUS * Math.sin(angle);
        const y = arcTL.cy - TK.RADIUS * Math.cos(angle);
        PATH_WAYPOINTS.push({ x, y });
      }

      // Compute cumulative distances
      PATH_CUMULATIVE = [0];
      for (let i = 1; i < PATH_WAYPOINTS.length; i++) {
        const p1 = PATH_WAYPOINTS[i - 1];
        const p2 = PATH_WAYPOINTS[i];
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        PATH_CUMULATIVE.push(PATH_CUMULATIVE[i - 1] + dist);
      }
      PATH_LENGTH = PATH_CUMULATIVE[PATH_CUMULATIVE.length - 1];

      // Find station distances on path
      let minDistA = Infinity, minDistB = Infinity;
      for (let i = 0; i < PATH_WAYPOINTS.length; i++) {
        const p = PATH_WAYPOINTS[i];
        const d = Math.sqrt((p.x - STATION_A.x) ** 2 + (p.y - STATION_A.y) ** 2);
        if (d < minDistA) {
          minDistA = d;
          STATION_A_DIST = PATH_CUMULATIVE[i];
        }
      }
      for (let i = 0; i < PATH_WAYPOINTS.length; i++) {
        const p = PATH_WAYPOINTS[i];
        const d = Math.sqrt((p.x - STATION_B.x) ** 2 + (p.y - STATION_B.y) ** 2);
        if (d < minDistB) {
          minDistB = d;
          STATION_B_DIST = PATH_CUMULATIVE[i];
        }
      }
    }

    function posAtDist(d) {
      d = wrapDist(d);
      if (PATH_CUMULATIVE.length === 0) return { x: 0, y: 0 };

      // Binary search
      let left = 0, right = PATH_CUMULATIVE.length - 1;
      while (left < right) {
        const mid = Math.floor((left + right) / 2);
        if (PATH_CUMULATIVE[mid] < d) {
          left = mid + 1;
        } else {
          right = mid;
        }
      }

      if (left === 0) return PATH_WAYPOINTS[0];
      if (left >= PATH_CUMULATIVE.length) return PATH_WAYPOINTS[PATH_WAYPOINTS.length - 1];

      const i1 = left - 1;
      const i2 = left;
      const d1 = PATH_CUMULATIVE[i1];
      const d2 = PATH_CUMULATIVE[i2];

      if (d2 === d1) return PATH_WAYPOINTS[i1];

      const t = (d - d1) / (d2 - d1);
      const p1 = PATH_WAYPOINTS[i1];
      const p2 = PATH_WAYPOINTS[i2];

      return {
        x: p1.x + t * (p2.x - p1.x),
        y: p1.y + t * (p2.y - p1.y)
      };
    }

    function angleAtDist(d) {
      const delta = 0.5;
      const p1 = posAtDist(d - delta);
      const p2 = posAtDist(d + delta);
      return Math.atan2(p2.y - p1.y, p2.x - p1.x);
    }

    function wrapDist(d) {
      if (PATH_LENGTH === 0) return 0;
      return ((d % PATH_LENGTH) + PATH_LENGTH) % PATH_LENGTH;
    }

    /* ===== STATE OBJECT ===== */
    const state = {
      train: {
        dist: 0,
        speed: 0,
        phase: 'DOCKED',
        dwellTimer: DWELL_TIME,
        atStation: 'A',
        lastStation: 'A',
        lastStationDist: 0,
        carriages: Array.from({ length: CARRIAGE_COUNT }, () => ({ ore: 0.0 }))
      },
      craneA: { ore: 0.0 },
      craneB: { ore: 0.0 },
      quarryA: new Float32Array(80),
      quarryB: new Float32Array(80),
      quarryAFlash: 0,  // Flash timer for quarry A
      quarryBFlash: 0,  // Flash timer for quarry B
      lastQuarryATotal: 0,  // Track previous fill state
      lastQuarryBTotal: 0,  // Track previous fill state
      trucks: [],
      isReversed: false,
      stats: {
        oreMoved: 0.0,
        cycleCount: 0,
        totalTime: 0.0
      }
    };

    // Initialize quarries: A full, B empty
    for (let i = 0; i < 80; i++) {
      state.quarryA[i] = 7 + Math.random() * 1;
      state.quarryB[i] = 0 + Math.random() * 1;
    }

    // Truck colors - warm earthy palette
    const TRUCK_COLORS = [
      '#d4554a',  // warm red
      '#d4843a',  // orange
      '#c8943a',  // burnt orange
      '#a88550',  // tan
      '#8b7a4a'   // brown
    ];

    // Initialize trucks with unique colors
    for (let i = 0; i < TRUCKS_PER_STATION; i++) {
      state.trucks.push({
        side: 'A',
        phase: 'IDLE',
        roadDist: 0,
        ore: 0.0,
        waitTimer: 0,
        x: ROAD_A[0].x,
        y: ROAD_A[0].y,
        colorIdx: i,
        bobbleTime: 0
      });
    }
    for (let i = 0; i < TRUCKS_PER_STATION; i++) {
      state.trucks.push({
        side: 'B',
        phase: 'IDLE',
        roadDist: 0,
        ore: 0.0,
        waitTimer: 0,
        x: ROAD_B[0].x,
        y: ROAD_B[0].y,
        colorIdx: (i + TRUCKS_PER_STATION) % TRUCK_COLORS.length,
        bobbleTime: 0
      });
    }

    /* ===== TRAIN MOVEMENT ===== */
    function updateTrain(dt) {
      const train = state.train;

      if (train.phase === 'DOCKED') {
        train.dwellTimer -= dt;
        if (train.dwellTimer <= 0) {
          train.phase = 'ACCEL';
          train.dwellTimer = 0;
        }
        return;
      }

      train.dist = wrapDist(train.dist + train.speed * dt);

      const nextStDist = (train.atStation === 'A') ? STATION_B_DIST : STATION_A_DIST;
      const distFromLast = wrapDist(train.dist - train.lastStationDist);
      const distToNext = wrapDist(nextStDist - train.dist);

      if (train.phase === 'ACCEL') {
        const t = Math.min(distFromLast / ACCEL_DIST, 1);
        train.speed = CRUISE_SPEED * t;
        if (t >= 1) train.phase = 'CRUISE';
      }

      if (train.phase === 'CRUISE') {
        train.speed = CRUISE_SPEED;
        if (distToNext <= ACCEL_DIST) train.phase = 'DECEL';
      }

      if (train.phase === 'DECEL') {
        const t = Math.max(distToNext / ACCEL_DIST, 0);
        train.speed = CRUISE_SPEED * t;
        if (distToNext <= 6) {
          train.dist = nextStDist;
          train.speed = 0;
          train.phase = 'DOCKED';
          train.dwellTimer = DWELL_TIME;
          train.lastStation = train.atStation;
          train.atStation = (train.atStation === 'A') ? 'B' : 'A';
          train.lastStationDist = nextStDist;
        }
      }
    }

    /* ===== CRANE OPERATIONS ===== */
    function updateCranes(dt) {
      if (state.train.phase !== 'DOCKED') return;

      const RATE = 2.0;
      const delta = RATE * dt;
      const train = state.train;

      if (train.atStation === 'A') {
        // Load: craneA → carriages
        for (let i = 0; i < CARRIAGE_COUNT; i++) {
          if (state.craneA.ore <= 0) break;
          const space = CARRIAGE_CAPACITY - train.carriages[i].ore;
          const xfer = Math.min(space, state.craneA.ore, delta);
          train.carriages[i].ore += xfer;
          state.craneA.ore -= xfer;
        }
      } else {
        // Unload: carriages → craneB
        for (let i = CARRIAGE_COUNT - 1; i >= 0; i--) {
          if (train.carriages[i].ore <= 0) break;
          const space = CARRIAGE_CAPACITY * CARRIAGE_COUNT - state.craneB.ore;
          const xfer = Math.min(train.carriages[i].ore, space, delta);
          train.carriages[i].ore -= xfer;
          state.craneB.ore += xfer;
          state.stats.oreMoved += xfer;
        }
      }
    }

    /* ===== QUARRY HELPERS ===== */
    function quarryTotal(q) {
      return Array.from(q).reduce((s, h) => s + h, 0);
    }

    function removeOreFromQuarry(q, amount) {
      let remaining = amount;
      // Remove from tallest cells first
      for (let iter = 0; iter < 10 && remaining > 0; iter++) {
        let maxIdx = -1, maxH = -1;
        for (let i = 0; i < q.length; i++) {
          if (q[i] > maxH) {
            maxH = q[i];
            maxIdx = i;
          }
        }
        if (maxIdx === -1) break;
        const xfer = Math.min(q[maxIdx], remaining);
        q[maxIdx] -= xfer;
        remaining -= xfer;
      }
      return amount - remaining;
    }

    function depositOreToQuarry(q, amount) {
      let remaining = amount;
      // Deposit to lowest cells first
      for (let iter = 0; iter < 10 && remaining > 0; iter++) {
        let minIdx = -1, minH = Infinity;
        for (let i = 0; i < q.length; i++) {
          if (q[i] < minH && q[i] < 8) {
            minH = q[i];
            minIdx = i;
          }
        }
        if (minIdx === -1) break;
        const space = Math.min(8 - q[minIdx], remaining);
        q[minIdx] += space;
        remaining -= space;
      }
      return amount - remaining;
    }

    /* ===== TRUCK MOVEMENT ===== */
    function roadLength(road) {
      let len = 0;
      for (let i = 1; i < road.length; i++) {
        const p1 = road[i - 1];
        const p2 = road[i];
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        len += Math.sqrt(dx * dx + dy * dy);
      }
      return len;
    }

    function roadPosAtDist(road, d) {
      let cum = 0;
      for (let i = 1; i < road.length; i++) {
        const p1 = road[i - 1];
        const p2 = road[i];
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (cum + dist >= d) {
          const t = (d - cum) / dist;
          return {
            x: p1.x + t * dx,
            y: p1.y + t * dy
          };
        }
        cum += dist;
      }
      return road[road.length - 1];
    }

    function updateTrucks(dt) {
      const LOAD_TIME = 1.5;
      const DEPOSIT_TIME = 1.0;
      const PULLOVER_DIST = 350;  // Distance from end where pullover area starts

      for (const truck of state.trucks) {
        const road = (truck.side === 'A') ? ROAD_A : ROAD_B;
        const roadLen = roadLength(road);

        // Update bobble timer for animation
        if (truck.phase === 'AT_QUARRY' || truck.phase === 'AT_CRANE') {
          truck.bobbleTime += dt;
        }

        if (truck.phase === 'IDLE') {
          if (!state.isReversed && truck.side === 'A') {
            truck.phase = 'TO_QUARRY';
            truck.roadDist = 0;
          } else if (state.isReversed && truck.side === 'B') {
            truck.phase = 'TO_QUARRY';
            truck.roadDist = 0;
          } else if (!state.isReversed && truck.side === 'B') {
            truck.phase = 'TO_CRANE';
            truck.roadDist = 0;
          } else if (state.isReversed && truck.side === 'A') {
            truck.phase = 'TO_CRANE';
            truck.roadDist = 0;
          }
          continue;
        }

        if (truck.phase === 'TO_QUARRY') {
          // Check for truck ahead blocking the path
          let truckAhead = null;
          let minDist = Infinity;
          for (const other of state.trucks) {
            if (other === truck || other.side !== truck.side) continue;
            if (other.phase === 'AT_QUARRY' || other.phase === 'TO_QUARRY') {
              const dist = other.roadDist - truck.roadDist;
              if (dist > 0 && dist < minDist) {
                minDist = dist;
                truckAhead = other;
              }
            }
          }

          if (truckAhead && minDist < 80) {
            // Truck ahead too close, go to pullover
            truck.phase = 'AT_PULLOVER';
            truck.pulloverTarget = Math.min(truck.roadDist + 100, PULLOVER_DIST);
          } else {
            truck.roadDist += TRUCK_SPEED * dt;
            if (truck.roadDist >= PULLOVER_DIST) {
              truck.roadDist = PULLOVER_DIST;
              truck.phase = 'AT_QUARRY';
              truck.waitTimer = LOAD_TIME;
            }
          }
        } else if (truck.phase === 'AT_PULLOVER') {
          // Wait in pullover until truck ahead clears
          let truckAhead = null;
          for (const other of state.trucks) {
            if (other === truck || other.side !== truck.side) continue;
            if (other.phase === 'AT_QUARRY' || other.roadDist >= PULLOVER_DIST - 50) {
              truckAhead = other;
              break;
            }
          }

          if (!truckAhead) {
            // Path clear, resume
            truck.phase = 'TO_QUARRY';
          }
        } else if (truck.phase === 'AT_QUARRY') {
          truck.waitTimer -= dt;
          if (truck.waitTimer <= 0) {
            const removed = removeOreFromQuarry(
              (truck.side === 'A') ? state.quarryA : state.quarryB,
              2.0
            );
            truck.ore = removed;
            truck.phase = 'TO_CRANE';
            truck.roadDist = roadLen;
            truck.bobbleTime = 0;
          }
        } else if (truck.phase === 'TO_CRANE') {
          truck.roadDist -= TRUCK_SPEED * dt;
          if (truck.roadDist <= 0) {
            truck.roadDist = 0;
            truck.phase = 'AT_CRANE';
            truck.waitTimer = DEPOSIT_TIME;
          }
        } else if (truck.phase === 'AT_CRANE') {
          truck.waitTimer -= dt;
          if (truck.waitTimer <= 0) {
            if (truck.side === 'A') {
              state.craneA.ore += truck.ore;
            } else {
              state.craneB.ore += truck.ore;
            }
            truck.ore = 0;
            truck.phase = 'IDLE';
            truck.bobbleTime = 0;
          }
        }

        // Update position
        const pos = roadPosAtDist(road, truck.roadDist);
        truck.x = pos.x;
        truck.y = pos.y;
      }
    }

    /* ===== REVERSAL LOGIC ===== */
    function checkReversal() {
      const totA = quarryTotal(state.quarryA);
      const totB = quarryTotal(state.quarryB);

      if (!state.isReversed && totA <= EMPTY_THRESHOLD && totB >= FULL_THRESHOLD) {
        state.isReversed = true;
        state.stats.cycleCount++;
      } else if (state.isReversed && totB <= EMPTY_THRESHOLD && totA >= FULL_THRESHOLD) {
        state.isReversed = false;
        state.stats.cycleCount++;
      }
    }

    /* ===== QUARRY FILL STATE TRACKING ===== */
    function updateQuarryFlash(dt) {
      const totA = quarryTotal(state.quarryA);
      const totB = quarryTotal(state.quarryB);

      // Check if A's fill state changed (empty/full thresholds)
      const aWasEmpty = state.lastQuarryATotal <= EMPTY_THRESHOLD;
      const aIsEmpty = totA <= EMPTY_THRESHOLD;
      const aWasFull = state.lastQuarryATotal >= FULL_THRESHOLD;
      const aIsFull = totA >= FULL_THRESHOLD;

      if ((aWasEmpty && !aIsEmpty) || (aWasFull && !aIsFull) || (aIsEmpty && !aWasEmpty) || (aIsFull && !aWasFull)) {
        state.quarryAFlash = 0.3;  // 300ms flash
      }

      // Check if B's fill state changed
      const bWasEmpty = state.lastQuarryBTotal <= EMPTY_THRESHOLD;
      const bIsEmpty = totB <= EMPTY_THRESHOLD;
      const bWasFull = state.lastQuarryBTotal >= FULL_THRESHOLD;
      const bIsFull = totB >= FULL_THRESHOLD;

      if ((bWasEmpty && !bIsEmpty) || (bWasFull && !bIsFull) || (bIsEmpty && !bWasEmpty) || (bIsFull && !bWasFull)) {
        state.quarryBFlash = 0.3;  // 300ms flash
      }

      state.lastQuarryATotal = totA;
      state.lastQuarryBTotal = totB;

      // Decay flash timers
      state.quarryAFlash = Math.max(0, state.quarryAFlash - dt);
      state.quarryBFlash = Math.max(0, state.quarryBFlash - dt);
    }

    /* ===== RENDERING ===== */

    // Deterministic PRNG for terrain
    function mulberry32(seed) {
      return function() {
        let t = (seed += 0x6D2B79F5) | 0;
        t = Math.imul(t ^ (t >>> 15), (t | 1));
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    const terrainRng = mulberry32(42);

    function drawTerrain() {
      for (let ty = 0; ty < CANVAS_H / CELL; ty++) {
        for (let tx = 0; tx < CANVAS_W / CELL; tx++) {
          const v = terrainRng();
          let color;
          if (v < 0.4) color = '#3a5c2a';      // grass
          else if (v < 0.7) color = '#6b4c2a'; // dirt
          else color = '#5a5045';               // gravel

          ctx.fillStyle = color;
          ctx.fillRect(tx * CELL, ty * CELL, CELL, CELL);
        }
      }
    }

    function drawRoads() {
      const drawRoad = (road) => {
        ctx.strokeStyle = '#7a5c3a';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(road[0].x, road[0].y);
        for (let i = 1; i < road.length; i++) {
          ctx.lineTo(road[i].x, road[i].y);
        }
        ctx.stroke();
      };

      drawRoad(ROAD_A);
      drawRoad(ROAD_B);
    }

    function drawQuarries() {
      const drawQuarry = (q, quarryDef, flashTimer) => {
        const { x, y, cols, rows, cellSize } = quarryDef;
        ctx.fillStyle = '#2a1a0a';
        ctx.fillRect(x, y, cols * cellSize, rows * cellSize);

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const idx = row * cols + col;
            const h = q[idx] || 0;

            let color;
            if (h < 2) color = '#c8a870';
            else if (h < 4) color = '#a88860';
            else if (h < 6) color = '#7a6a50';
            else color = '#3a3028';

            ctx.fillStyle = color;
            ctx.fillRect(x + col * cellSize, y + row * cellSize, cellSize, cellSize);

            // Cell border (thinner)
            ctx.strokeStyle = '#2a1a0a';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x + col * cellSize, y + row * cellSize, cellSize, cellSize);
          }
        }

        // Flash effect when fill state changes
        if (flashTimer > 0) {
          const flashAlpha = Math.min(1, flashTimer / 0.3 * 0.3);
          ctx.fillStyle = `rgba(255, 255, 150, ${flashAlpha * 0.5})`;
          ctx.fillRect(x, y, cols * cellSize, rows * cellSize);
        }
      };

      drawQuarry(state.quarryA, QUARRY_A, state.quarryAFlash);
      drawQuarry(state.quarryB, QUARRY_B, state.quarryBFlash);
    }

    function drawStations() {
      const drawStation = (loc, x, y) => {
        // Building
        ctx.fillStyle = '#8b7355';
        ctx.fillRect(x - 20, y - 20, 40, 30);

        // Roof
        ctx.fillStyle = '#5a4a3a';
        ctx.beginPath();
        ctx.moveTo(x - 20, y - 20);
        ctx.lineTo(x, y - 30);
        ctx.lineTo(x + 20, y - 20);
        ctx.closePath();
        ctx.fill();

        // Windows
        ctx.fillStyle = '#d4b896';
        ctx.fillRect(x - 12, y - 15, 8, 8);
        ctx.fillRect(x + 4, y - 15, 8, 8);

        // Door
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(x - 6, y - 2, 12, 12);

        // Platform
        ctx.fillStyle = '#6b5a4a';
        ctx.fillRect(x - 25, y + 10, 50, 6);
      };

      drawStation('A', STATION_A.x, STATION_A.y);
      drawStation('B', STATION_B.x, STATION_B.y);
    }

    function drawTrack() {
      // Sleepers
      ctx.fillStyle = '#6b5a4a';
      for (let i = 0; i < PATH_WAYPOINTS.length; i += 16) {
        const p = PATH_WAYPOINTS[i];
        const angle = angleAtDist(PATH_CUMULATIVE[i]);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);
        ctx.fillRect(-8, -2, 16, 4);
        ctx.restore();
      }

      // Rails
      ctx.strokeStyle = '#4a4a4a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(PATH_WAYPOINTS[0].x - 3, PATH_WAYPOINTS[0].y);
      for (let i = 1; i < PATH_WAYPOINTS.length; i++) {
        ctx.lineTo(PATH_WAYPOINTS[i].x - 3, PATH_WAYPOINTS[i].y);
      }
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(PATH_WAYPOINTS[0].x + 3, PATH_WAYPOINTS[0].y);
      for (let i = 1; i < PATH_WAYPOINTS.length; i++) {
        ctx.lineTo(PATH_WAYPOINTS[i].x + 3, PATH_WAYPOINTS[i].y);
      }
      ctx.stroke();
    }

    function drawCrane(side) {
      const crane = (side === 'A') ? CRANE_A : CRANE_B;
      const y = crane.baseY;

      // Legs
      ctx.strokeStyle = '#7a5a3a';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(crane.x - 15, y);
      ctx.lineTo(crane.x - 15, y + 40);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(crane.x + 15, y);
      ctx.lineTo(crane.x + 15, y + 40);
      ctx.stroke();

      // Beam
      ctx.strokeStyle = '#8b6a4a';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(crane.x - 15, y);
      ctx.lineTo(crane.x + 15, y);
      ctx.stroke();

      // Trolley
      const trolleyX = crane.x - 10 + ((side === 'A') ? state.craneA.ore : state.craneB.ore) * 2;
      ctx.fillStyle = '#a87a4a';
      ctx.fillRect(trolleyX - 8, y - 4, 16, 8);

      // Hook
      ctx.strokeStyle = '#6a5a4a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(trolleyX, y + 4);
      ctx.lineTo(trolleyX, y + 20);
      ctx.stroke();

      // Stacked ore
      ctx.fillStyle = '#c8a870';
      const oreCount = Math.floor((side === 'A') ? state.craneA.ore : state.craneB.ore);
      for (let i = 0; i < oreCount && i < 8; i++) {
        ctx.fillRect(trolleyX - 6, y + 20 + i * 3, 12, 3);
      }
    }

    function drawLocomotive() {
      const train = state.train;
      const pos = posAtDist(train.dist);
      const angle = angleAtDist(train.dist);

      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.rotate(angle);
      ctx.scale(1.5, 1.5);  // Scale train 1.5x

      // Body
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(-12, -8, 24, 16);

      // Cab
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(8, -7, 8, 14);

      // Windows
      ctx.fillStyle = '#d4c8a8';
      ctx.fillRect(9, -5, 4, 4);
      ctx.fillRect(9, 1, 4, 4);

      // Boiler stripe
      ctx.strokeStyle = '#8b7a6a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-8, 0);
      ctx.lineTo(8, 0);
      ctx.stroke();

      // Chimney
      ctx.fillStyle = '#4a3a2a';
      ctx.fillRect(-6, -10, 4, 4);

      // Wheels
      ctx.fillStyle = '#2a1a0a';
      ctx.beginPath();
      ctx.arc(-8, 8, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(8, 8, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawCarriage(i) {
      const train = state.train;
      const carriageDist = wrapDist(train.dist - (i + 1) * CARRIAGE_SPACING);
      const pos = posAtDist(carriageDist);
      const angle = angleAtDist(carriageDist);
      const carriage = train.carriages[i];

      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.rotate(angle);
      ctx.scale(1.5, 1.5);  // Scale carriages 1.5x to match train

      // Body
      ctx.fillStyle = '#6b5a4a';
      ctx.fillRect(-10, -6, 20, 12);

      // Ore visualization
      ctx.fillStyle = '#c8a870';
      const oreHeight = (carriage.ore / CARRIAGE_CAPACITY) * 6;
      ctx.fillRect(-8, -2 - oreHeight, 16, oreHeight);

      // Wheels
      ctx.fillStyle = '#2a1a0a';
      ctx.beginPath();
      ctx.arc(-6, 6, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(6, 6, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawTruck(truck) {
      const angle = Math.atan2(truck.y - (truck.y || 0), truck.x - (truck.x || 0));

      // Add bobbing during load/unload
      let bobbleY = 0;
      if (truck.phase === 'AT_QUARRY' || truck.phase === 'AT_CRANE') {
        bobbleY = Math.sin(truck.bobbleTime * Math.PI * 3) * 2;
      }

      ctx.save();
      ctx.translate(truck.x, truck.y + bobbleY);
      ctx.rotate(angle);
      ctx.scale(1.5, 1.5);  // Scale trucks 1.5x

      // Get truck color
      const truckColor = TRUCK_COLORS[truck.colorIdx % TRUCK_COLORS.length];

      // Cabin
      ctx.fillStyle = truckColor;
      ctx.fillRect(-8, -4, 6, 8);

      // Body
      ctx.fillStyle = '#6b5a4a';
      ctx.fillRect(-2, -5, 12, 10);

      // Ore in body
      ctx.fillStyle = '#c8a870';
      const oreHeight = (truck.ore / 2.0) * 4;
      ctx.fillRect(0, -3 - oreHeight, 8, oreHeight);

      // Wheels
      ctx.fillStyle = '#2a1a0a';
      ctx.beginPath();
      ctx.arc(-4, 5, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(4, 5, 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawDayNight() {
      const nightAlpha = Math.max(
        0,
        Math.sin(state.dayTime * Math.PI * 2 - Math.PI / 2) * -0.325 + 0.325
      );
      ctx.fillStyle = `rgba(20, 15, 60, ${nightAlpha})`;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }

    function drawLabels() {
      // Time
      const minutes = Math.floor(state.stats.totalTime / 60);
      const seconds = Math.floor(state.stats.totalTime % 60);
      const timeStr = `${minutes}:${String(seconds).padStart(2, '0')}`;

      ctx.fillStyle = '#d4c8a8';
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'right';
      ctx.fillText(timeStr, CANVAS_W - 10, 20);

      // Flow arrow
      ctx.font = 'bold 14px Courier New';
      ctx.textAlign = 'left';
      ctx.fillText(state.isReversed ? '◄ B→A' : 'A→B ►', 10, 20);
    }

    function render() {
      // Simple dot pattern background instead of varied terrain
      ctx.fillStyle = '#1a1815';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Subtle dot pattern
      ctx.fillStyle = '#2a251f';
      for (let x = 0; x < CANVAS_W; x += 20) {
        for (let y = 0; y < CANVAS_H; y += 20) {
          ctx.beginPath();
          ctx.arc(x + 10, y + 10, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      drawRoads();
      drawQuarries();
      drawTrack();
      drawStations();
      drawCrane('A');
      drawCrane('B');
      drawLocomotive();
      for (let i = CARRIAGE_COUNT - 1; i >= 0; i--) {
        drawCarriage(i);
      }
      for (const truck of state.trucks) {
        drawTruck(truck);
      }
      drawLabels();
    }

    /* ===== SIDEBAR UI ===== */
    let uiTimer = 0;

    function updateUI() {
      const train = state.train;
      const totA = quarryTotal(state.quarryA);
      const totB = quarryTotal(state.quarryB);

      // Train status
      document.getElementById('trainState').textContent = train.phase;
      document.getElementById('trainLoc').textContent = train.atStation;
      document.getElementById('trainSpeed').textContent = Math.round(train.speed);

      const trainCargo = train.carriages.reduce((s, c) => s + c.ore, 0);
      document.getElementById('trainCargo').textContent = `${Math.round(trainCargo)}/${CARRIAGE_COUNT * CARRIAGE_CAPACITY}`;

      // Carriages list
      let carriageHTML = '';
      for (let i = 0; i < CARRIAGE_COUNT; i++) {
        const pct = (train.carriages[i].ore / CARRIAGE_CAPACITY) * 100;
        carriageHTML += `
          <div style="margin: 2px 0;">
            <div style="font-size: 7px; color: #8a7a68;">#${i + 1}</div>
            <div class="carriage-bar">
              <div class="carriage-fill" style="width: ${pct}%;"></div>
            </div>
          </div>
        `;
      }
      document.getElementById('carriagesList').innerHTML = carriageHTML;

      // Quarry levels
      const pctA = Math.round((totA / MAX_QUARRY_ORE) * 100);
      const pctB = Math.round((totB / MAX_QUARRY_ORE) * 100);
      document.getElementById('quarryALevel').textContent = `${pctA}%`;
      document.getElementById('quarryBLevel').textContent = `${pctB}%`;
      document.getElementById('quarryABar').style.width = `${pctA}%`;
      document.getElementById('quarryBBar').style.width = `${pctB}%`;

      // Truck status
      const truckCountA = state.trucks.filter(t => t.side === 'A' && t.phase !== 'IDLE').length;
      const truckCountB = state.trucks.filter(t => t.side === 'B' && t.phase !== 'IDLE').length;
      document.getElementById('trucksAStatus').textContent = truckCountA > 0 ? `${truckCountA}/3 busy` : 'idle';
      document.getElementById('trucksBStatus').textContent = truckCountB > 0 ? `${truckCountB}/3 busy` : 'idle';

      // Metrics
      const oreMoved = Math.round(state.stats.oreMoved);
      const throughput = state.stats.totalTime > 0 ? Math.round((oreMoved / state.stats.totalTime) * 60) : 0;
      document.getElementById('metricsOreMoved').textContent = throughput;
      document.getElementById('metricsCycles').textContent = state.stats.cycleCount;

      const minutes = Math.floor(state.stats.totalTime / 60);
      const seconds = Math.floor(state.stats.totalTime % 60);
      document.getElementById('metricsTime').textContent = `${minutes}:${String(seconds).padStart(2, '0')}`;

      document.getElementById('metricsFlow').textContent = state.isReversed ? 'B→A' : 'A→B';
    }

    /* ===== GAME LOOP ===== */
    let lastTs = 0;

    function gameLoop(ts) {
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;

      state.stats.totalTime += dt;

      updateTrain(dt);
      updateCranes(dt);
      updateTrucks(dt);
      checkReversal();
      updateQuarryFlash(dt);

      render();

      uiTimer += dt;
      if (uiTimer >= 0.1) {
        updateUI();
        uiTimer = 0;
      }

      requestAnimationFrame(gameLoop);
    }

    /* ===== INITIALIZATION ===== */
    buildPath();
    state.train.dist = STATION_A_DIST;
    state.train.lastStationDist = STATION_A_DIST;

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
