<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train Sim — Grid-Based with Carriages</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #1a1815;
      color: #e8e0d5;
      overflow: hidden;
      display: flex;
      height: 100vh;
    }

    #gameContainer {
      flex: 1;
      position: relative;
      width: 1200px;
      height: 600px;
      background: #2d2a26;
      border: 2px solid #5a4a3a;
      display: flex;
      flex-direction: column;
    }

    #canvas {
      flex: 1;
      background: #2d2a26;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #sidebar {
      width: 300px;
      background: #0f0d0a;
      border-left: 3px solid #5a4a3a;
      padding: 12px;
      overflow-y: auto;
      font-size: 10px;
      line-height: 1.5;
      color: #d8d0c5;
      min-width: 300px;
    }

    #sidebar::-webkit-scrollbar {
      width: 6px;
    }

    #sidebar::-webkit-scrollbar-track {
      background: #1a1815;
    }

    #sidebar::-webkit-scrollbar-thumb {
      background: #4a3a2a;
      border-radius: 3px;
    }

    .section {
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #3a2a1a;
    }

    .section:last-child {
      border-bottom: none;
    }

    .section h3 {
      font-size: 11px;
      font-weight: bold;
      color: #c4b5a0;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #4a3a2a;
      padding-bottom: 3px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
      font-size: 9px;
    }

    .stat-label {
      color: #a8987f;
      flex: 1;
    }

    .stat-value {
      color: #f0e8d8;
      font-weight: bold;
      text-align: right;
      flex: 0 0 80px;
    }

    .stat-value.warning {
      color: #d4a574;
    }

    .stat-value.good {
      color: #8ab885;
    }

    .carriage-info {
      background: #1a1815;
      border-left: 2px solid #8b7355;
      padding: 3px 5px;
      margin: 2px 0;
      font-size: 8px;
      color: #b8a895;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #1a1815;
      border: 1px solid #3a2a1a;
      margin-top: 2px;
      overflow: hidden;
      border-radius: 1px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b7355 0%, #a89070 100%);
      transition: width 0.3s ease;
      border-radius: 1px;
    }

    .metrics-row {
      display: flex;
      justify-content: space-between;
      font-size: 8px;
      margin-bottom: 2px;
      padding: 2px;
      background: #1a1815;
      border-radius: 1px;
    }

    .metrics-label {
      color: #8a7a65;
    }

    .metrics-value {
      color: #d4b896;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="canvas"></canvas>
  </div>

  <div id="sidebar">
    <!-- Train Section -->
    <div class="section">
      <h3>🚂 Train Status</h3>
      <div class="stat-row">
        <span class="stat-label">State:</span>
        <span class="stat-value" id="trainStatus">LOADING</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Position:</span>
        <span class="stat-value" id="trainPosition">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Total Cargo:</span>
        <span class="stat-value" id="trainTotalCargo">0/9</span>
      </div>
    </div>

    <!-- Carriages Section -->
    <div class="section">
      <h3>📦 Carriages</h3>
      <div id="carriagesList"></div>
    </div>

    <!-- Top Quarry Section -->
    <div class="section">
      <h3>⛏️ Top Quarry</h3>
      <div class="stat-row">
        <span class="stat-label">Blocks:</span>
        <span class="stat-value" id="topQuarryBlocks">0/384</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="topQuarryBar" style="width: 100%;"></div>
      </div>
    </div>

    <!-- Top Crane Section -->
    <div class="section">
      <h3>🏗️ Top Crane</h3>
      <div class="stat-row">
        <span class="stat-label">Stacked:</span>
        <span class="stat-value" id="topCraneBlocks">0/8</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">State:</span>
        <span class="stat-value" id="topCraneState">IDLE</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="topCraneBar" style="width: 0%;"></div>
      </div>
    </div>

    <!-- Bottom Quarry Section -->
    <div class="section">
      <h3>⛏️ Bottom Quarry</h3>
      <div class="stat-row">
        <span class="stat-label">Blocks:</span>
        <span class="stat-value" id="bottomQuarryBlocks">0/384</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="bottomQuarryBar" style="width: 0%;"></div>
      </div>
    </div>

    <!-- Bottom Crane Section -->
    <div class="section">
      <h3>🏗️ Bottom Crane</h3>
      <div class="stat-row">
        <span class="stat-label">Stacked:</span>
        <span class="stat-value" id="bottomCraneBlocks">0/8</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">State:</span>
        <span class="stat-value" id="bottomCraneState">IDLE</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="bottomCraneBar" style="width: 0%;"></div>
      </div>
    </div>

    <!-- System Metrics -->
    <div class="section">
      <h3>📊 Metrics</h3>
      <div class="metrics-row">
        <span class="metrics-label">Blocks Moved:</span>
        <span class="metrics-value" id="totalBlocksMoved">0</span>
      </div>
      <div class="metrics-row">
        <span class="metrics-label">Throughput:</span>
        <span class="metrics-value" id="throughputRate">0/min</span>
      </div>
      <div class="metrics-row">
        <span class="metrics-label">Reversals:</span>
        <span class="metrics-value" id="reversalCount">0</span>
      </div>
    </div>
  </div>

  <script>
    // ===== GRID SYSTEM CONSTANTS =====
    const GRID = {
      WIDTH: 20,      // 20 columns
      HEIGHT: 10,     // 10 rows
      CELL_SIZE: 60,  // 60 pixels per cell
      CANVAS_WIDTH: 1200,
      CANVAS_HEIGHT: 600,
    };

    // ===== GAME CONFIGURATION =====
    const CONFIG = {
      QUARRY_GRID_WIDTH: 24,
      QUARRY_GRID_HEIGHT: 16,
      BLOCK_SIZE: 10,
      CARRIAGE_COUNT: 3,
      CARRIAGE_CAPACITY: 3,
      MAX_CRANE_STACK: 8,
      TRUCK_COUNT_PER_STATION: 5,
      BLOCKS_PER_TRUCK: 1,
      BLOCK_HEIGHT_LEVELS: 8,
      TRAIN_SPEED: 0.15,           // Slower train speed (waypoints per frame)
      TRUCK_SPEED: 0.8,            // Truck movement speed (grid units per frame)
      CRANE_TRANSFER_TIME: 20,     // Frames to load/unload one block
      TRUCK_PICKUP_TIME: 25,       // Frames to pick up a block
      TRUCK_DROPOFF_TIME: 20,      // Frames to drop off at crane
    };

    // ===== COLOR PALETTE =====
    const COLOURS = {
      canvas_bg: '#2d2a26',
      grass: '#4a6a3a',
      dirt: '#5a5a4a',
      gravel: '#6a6a5a',
      blockEmpty: '#7a7a6a',
      blockLevel1: '#8a8a7a',
      blockLevel2: '#9a9a85',
      blockLevel3: '#8b8365',
      blockLevel4: '#8b7355',
      blockLevel5: '#7a6a45',
      blockLevel6: '#6a5a35',
      blockLevel7: '#5a4a25',
      blockLevel8: '#4a3a15',
      stationBg: '#b3a085',
      stationPlatform: '#9a8a75',
      craneMetal: '#6a6a6a',
      craneArm: '#8a8a8a',
      trackWood: '#4a3a2a',
      trackSteel: '#3a3a3a',
      roadDirt: '#5a4a3a',
      roadGravel: '#6a5a45',
      roadLine: '#4a3a2a',
      trainBody: '#3a4a5a',
      trainDoor: '#2a3a4a',
      trainWheel: '#2a2a2a',
      carriageBody: '#5a6a7a',
      carriageDoor: '#4a5a6a',
      truckBody: '#6a5a4a',
      truckCab: '#7a6a5a',
      truckWheel: '#1a1a1a',
      accent1: '#c4a574',
      accent2: '#d4a574',
      accent3: '#e4b584',
    };

    // ===== GAME STATE =====
    const gameState = {
      topQuarry: [],
      bottomQuarry: [],
      train: {
        state: 'DOCKED_AT_TOP',
        waypointIndex: 0,
        waypointProgress: 0,        // 0 to 1, interpolation between waypoints
        speed: 0,
        haltCounter: 0,
        haltDuration: 120,          // Longer halt for more visible docking
        carriages: [
          { blocks: 0, capacity: CONFIG.CARRIAGE_CAPACITY },
          { blocks: 0, capacity: CONFIG.CARRIAGE_CAPACITY },
          { blocks: 0, capacity: CONFIG.CARRIAGE_CAPACITY },
        ],
        x: 0,
        y: 0,
      },
      topCrane: {
        blocks: 0,
        maxStack: CONFIG.MAX_CRANE_STACK,
        transferTimer: 0,
        transferState: 'IDLE'        // 'LOADING' or 'IDLE'
      },
      bottomCrane: {
        blocks: 0,
        maxStack: CONFIG.MAX_CRANE_STACK,
        transferTimer: 0,
        transferState: 'IDLE'        // 'UNLOADING' or 'IDLE'
      },
      trucks: [],
      stats: {
        blocksMoved: 0,
        reversalCount: 0,
        lastTopQuarryCount: 0,
        lastBottomQuarryCount: 0,
      },
      isReversed: false,
      frameCount: 0,
      uiUpdateCounter: 0,
    };

    // ===== TRACK WAYPOINTS (GRID-BASED RECTANGULAR LOOP) =====
    const TRACK_WAYPOINTS = [
      // Top row, going right
      { gx: 10, gy: 2 }, { gx: 11, gy: 2 }, { gx: 12, gy: 2 }, { gx: 13, gy: 2 },
      { gx: 14, gy: 2 }, { gx: 15, gy: 2 }, { gx: 16, gy: 2 }, { gx: 17, gy: 2 },
      { gx: 18, gy: 2 },
      // Right column, going down
      { gx: 18, gy: 3 }, { gx: 18, gy: 4 }, { gx: 18, gy: 5 }, { gx: 18, gy: 6 },
      { gx: 18, gy: 7 }, { gx: 18, gy: 8 },
      // Bottom row, going left
      { gx: 17, gy: 8 }, { gx: 16, gy: 8 }, { gx: 15, gy: 8 }, { gx: 14, gy: 8 },
      { gx: 13, gy: 8 }, { gx: 12, gy: 8 }, { gx: 11, gy: 8 }, { gx: 10, gy: 8 },
      // Left column, going up
      { gx: 10, gy: 7 }, { gx: 10, gy: 6 }, { gx: 10, gy: 5 }, { gx: 10, gy: 4 },
      { gx: 10, gy: 3 },
    ];

    // Station docking positions on track
    const STATIONS = {
      top: { waypointIndex: 0, gx: 10, gy: 2 },
      bottom: { waypointIndex: 15, gx: 18, gy: 8 },
    };

    // ===== CANVAS SETUP =====
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    canvas.width = GRID.CANVAS_WIDTH;
    canvas.height = GRID.CANVAS_HEIGHT;

    // ===== GRID UTILITY FUNCTIONS =====
    function gridToPixels(gx, gy) {
      return {
        px: gx * GRID.CELL_SIZE,
        py: gy * GRID.CELL_SIZE,
      };
    }

    function lerpGridPos(wp1, wp2, t) {
      return {
        px: (wp1.gx + (wp2.gx - wp1.gx) * t) * GRID.CELL_SIZE,
        py: (wp1.gy + (wp2.gy - wp1.gy) * t) * GRID.CELL_SIZE,
      };
    }

    // ===== INITIALIZATION =====
    function initializeQuarries() {
      gameState.topQuarry = [];
      for (let x = 0; x < CONFIG.QUARRY_GRID_WIDTH; x++) {
        for (let y = 0; y < CONFIG.QUARRY_GRID_HEIGHT; y++) {
          const height = 4 + Math.floor(Math.random() * 3);
          gameState.topQuarry.push({ x, y, height, type: 'ore', age: 0 });
        }
      }

      gameState.bottomQuarry = [];
      for (let x = 0; x < CONFIG.QUARRY_GRID_WIDTH; x++) {
        for (let y = 0; y < CONFIG.QUARRY_GRID_HEIGHT; y++) {
          gameState.bottomQuarry.push({ x, y, height: 0, type: 'ore', age: 0 });
        }
      }

      gameState.stats.lastTopQuarryCount = getTotalQuarryHeight(gameState.topQuarry);
      gameState.stats.lastBottomQuarryCount = getTotalQuarryHeight(gameState.bottomQuarry);
    }

    function initializeTrucks() {
      gameState.trucks = [];

      for (let i = 0; i < CONFIG.TRUCK_COUNT_PER_STATION; i++) {
        gameState.trucks.push({
          id: 'T' + (i + 1),
          station: 'top',
          state: 'IDLE_AT_STATION',
          gx: 4 + i * 0.5,
          gy: 2,
          blocks: 0,
          pathIndex: 0,
          waitTimer: Math.random() * 40,
          currentPath: [],
          pathProgress: 0,           // 0 to 1 for smooth movement between grid positions
        });
      }

      for (let i = 0; i < CONFIG.TRUCK_COUNT_PER_STATION; i++) {
        gameState.trucks.push({
          id: 'B' + (i + 1),
          station: 'bottom',
          state: 'IDLE_AT_STATION',
          gx: 4 + i * 0.5,
          gy: 8,
          blocks: 0,
          pathIndex: 0,
          waitTimer: Math.random() * 40,
          currentPath: [],
          pathProgress: 0,
        });
      }
    }

    // ===== UTILITY FUNCTIONS =====
    function getTotalQuarryHeight(quarry) {
      return quarry.reduce((sum, block) => sum + block.height, 0);
    }

    function getTotalTrainCargo() {
      return gameState.train.carriages.reduce((sum, c) => sum + c.blocks, 0);
    }

    function getBlockColor(height) {
      const colors = [
        COLOURS.blockEmpty,
        COLOURS.blockLevel1,
        COLOURS.blockLevel2,
        COLOURS.blockLevel3,
        COLOURS.blockLevel4,
        COLOURS.blockLevel5,
        COLOURS.blockLevel6,
        COLOURS.blockLevel7,
        COLOURS.blockLevel8,
      ];
      return colors[Math.min(height, 8)];
    }

    // ===== TRUCK PATHS (GRID-BASED L-SHAPED) =====
    const truckPaths = {
      topStationToTopQuarry: [],
      topQuarryToTopStation: [],
      bottomStationToBottomQuarry: [],
      bottomQuarryToBottomStation: [],
    };

    function buildTruckPaths() {
      // Top station to top quarry (L-shaped: right then down)
      truckPaths.topStationToTopQuarry = [];
      for (let x = 4; x <= 14; x += 1) {
        truckPaths.topStationToTopQuarry.push({ gx: x, gy: 2 });
      }
      for (let y = 2; y <= 3; y += 1) {
        truckPaths.topStationToTopQuarry.push({ gx: 14, gy: y });
      }
      truckPaths.topQuarryToTopStation = [...truckPaths.topStationToTopQuarry].reverse();

      // Bottom station to bottom quarry (L-shaped: right then up)
      truckPaths.bottomStationToBottomQuarry = [];
      for (let x = 4; x <= 14; x += 1) {
        truckPaths.bottomStationToBottomQuarry.push({ gx: x, gy: 8 });
      }
      for (let y = 8; y >= 7; y -= 1) {
        truckPaths.bottomStationToBottomQuarry.push({ gx: 14, gy: y });
      }
      truckPaths.bottomQuarryToBottomStation = [...truckPaths.bottomStationToBottomQuarry].reverse();
    }

    // ===== RENDERING HELPERS =====
    function drawRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), w, h);
    }

    function drawStrokedRect(x, y, w, h, fillColor, strokeColor, lineWidth = 1) {
      ctx.fillStyle = fillColor;
      ctx.fillRect(Math.round(x), Math.round(y), w, h);
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = lineWidth;
      ctx.strokeRect(Math.round(x), Math.round(y), w, h);
    }

    function drawCircle(x, y, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(Math.round(x), Math.round(y), r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawLine(x1, y1, x2, y2, color, width = 1) {
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(Math.round(x1), Math.round(y1));
      ctx.lineTo(Math.round(x2), Math.round(y2));
      ctx.stroke();
    }

    function drawText(text, x, y, color = '#e8e0d5', size = 10, align = 'left') {
      ctx.fillStyle = color;
      ctx.font = `${size}px monospace`;
      ctx.textAlign = align;
      ctx.fillText(text, x, y);
    }

    function drawGridCell(gx, gy, w, h, color) {
      const { px, py } = gridToPixels(gx, gy);
      drawRect(px, py, w * GRID.CELL_SIZE, h * GRID.CELL_SIZE, color);
    }

    // ===== RENDERING SYSTEM =====
    function drawRoads() {
      // Draw roads for truck paths
      // Top road (station to quarry)
      ctx.strokeStyle = COLOURS.roadDirt;
      ctx.lineWidth = 20;
      ctx.beginPath();

      let first = true;
      truckPaths.topStationToTopQuarry.forEach(wp => {
        const { px, py } = gridToPixels(wp.gx, wp.gy);
        if (first) {
          ctx.moveTo(px + GRID.CELL_SIZE / 2, py + GRID.CELL_SIZE / 2);
          first = false;
        } else {
          ctx.lineTo(px + GRID.CELL_SIZE / 2, py + GRID.CELL_SIZE / 2);
        }
      });
      ctx.stroke();

      // Draw road markings (center line)
      ctx.strokeStyle = COLOURS.roadLine;
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 5]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Bottom road (station to quarry)
      ctx.strokeStyle = COLOURS.roadDirt;
      ctx.lineWidth = 20;
      ctx.beginPath();

      first = true;
      truckPaths.bottomStationToBottomQuarry.forEach(wp => {
        const { px, py } = gridToPixels(wp.gx, wp.gy);
        if (first) {
          ctx.moveTo(px + GRID.CELL_SIZE / 2, py + GRID.CELL_SIZE / 2);
          first = false;
        } else {
          ctx.lineTo(px + GRID.CELL_SIZE / 2, py + GRID.CELL_SIZE / 2);
        }
      });
      ctx.stroke();

      ctx.strokeStyle = COLOURS.roadLine;
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawQuarries() {
      const topQuarryGx = 8;
      const topQuarryGy = 1;
      const bottomQuarryGx = 8;
      const bottomQuarryGy = 6;

      // Draw top quarry
      drawGridCell(topQuarryGx, topQuarryGy, 12, 4, '#3a2a1a');
      gameState.topQuarry.forEach(block => {
        const localX = block.x % 3;
        const localY = block.y % 4;
        const gx = topQuarryGx + (block.x / 3);
        const gy = topQuarryGy + (block.y / 4);
        const { px, py } = gridToPixels(gx, gy);
        const color = getBlockColor(block.height);

        // Draw stacked blocks with height
        for (let h = 0; h < block.height; h++) {
          const blockY = py + localY * 10 - (h * 2);
          const shade = h % 2 === 0 ? color : adjustBrightness(color, -15);
          drawRect(
            px + localX * 10,
            blockY,
            CONFIG.BLOCK_SIZE - 1,
            CONFIG.BLOCK_SIZE - 2,
            shade
          );
        }
      });
      drawText('TOP QUARRY', topQuarryGx * GRID.CELL_SIZE, topQuarryGy * GRID.CELL_SIZE - 8, COLOURS.accent1, 10);

      // Draw bottom quarry
      drawGridCell(bottomQuarryGx, bottomQuarryGy, 12, 4, '#3a2a1a');
      gameState.bottomQuarry.forEach(block => {
        const localX = block.x % 3;
        const localY = block.y % 4;
        const gx = bottomQuarryGx + (block.x / 3);
        const gy = bottomQuarryGy + (block.y / 4);
        const { px, py } = gridToPixels(gx, gy);
        const color = getBlockColor(block.height);

        // Draw stacked blocks with height
        for (let h = 0; h < block.height; h++) {
          const blockY = py + localY * 10 - (h * 2);
          const shade = h % 2 === 0 ? color : adjustBrightness(color, -15);
          drawRect(
            px + localX * 10,
            blockY,
            CONFIG.BLOCK_SIZE - 1,
            CONFIG.BLOCK_SIZE - 2,
            shade
          );
        }
      });
      drawText('BOTTOM QUARRY', bottomQuarryGx * GRID.CELL_SIZE, bottomQuarryGy * GRID.CELL_SIZE - 8, COLOURS.accent1, 10);
    }

    function adjustBrightness(color, amount) {
      const num = parseInt(color.replace("#", ""), 16);
      const r = Math.max(0, Math.min(255, (num >> 16) + amount));
      const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
      const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
      return "#" + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
    }

    function drawTrack() {
      // Draw track as rectangular loop
      const trackWaypoints = TRACK_WAYPOINTS;

      // Outer border
      ctx.strokeStyle = COLOURS.trackWood;
      ctx.lineWidth = 10;
      ctx.beginPath();
      let wp = trackWaypoints[0];
      let pos = gridToPixels(wp.gx, wp.gy);
      ctx.moveTo(pos.px + GRID.CELL_SIZE / 2, pos.py + GRID.CELL_SIZE / 2);

      for (let i = 1; i < trackWaypoints.length; i++) {
        wp = trackWaypoints[i];
        pos = gridToPixels(wp.gx, wp.gy);
        ctx.lineTo(pos.px + GRID.CELL_SIZE / 2, pos.py + GRID.CELL_SIZE / 2);
      }
      ctx.closePath();
      ctx.stroke();

      // Inner steel rail
      ctx.strokeStyle = COLOURS.trackSteel;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Sleepers
      ctx.strokeStyle = COLOURS.trackWood;
      ctx.lineWidth = 1;
      for (let i = 0; i < trackWaypoints.length; i++) {
        wp = trackWaypoints[i];
        const nextWp = trackWaypoints[(i + 1) % trackWaypoints.length];
        const { px, py } = gridToPixels(wp.gx, wp.gy);
        const { px: nextPx, py: nextPy } = gridToPixels(nextWp.gx, nextWp.gy);

        const perpX = -(nextPy - py) / 20;
        const perpY = (nextPx - px) / 20;

        drawLine(
          px + GRID.CELL_SIZE / 2 - perpX,
          py + GRID.CELL_SIZE / 2 - perpY,
          px + GRID.CELL_SIZE / 2 + perpX,
          py + GRID.CELL_SIZE / 2 + perpY,
          COLOURS.trackWood,
          1
        );
      }
    }

    function drawStations() {
      // Top station
      drawGridCell(2, 2, 2, 1, COLOURS.stationBg);
      drawRect(2 * GRID.CELL_SIZE + 2, 2 * GRID.CELL_SIZE + GRID.CELL_SIZE - 10, 2 * GRID.CELL_SIZE - 4, 10, COLOURS.stationPlatform);
      drawText('TOP', 3 * GRID.CELL_SIZE, 2 * GRID.CELL_SIZE - 8, COLOURS.accent1, 10, 'center');

      // Bottom station
      drawGridCell(2, 8, 2, 1, COLOURS.stationBg);
      drawRect(2 * GRID.CELL_SIZE + 2, 8 * GRID.CELL_SIZE, 2 * GRID.CELL_SIZE - 4, 10, COLOURS.stationPlatform);
      drawText('BOT', 3 * GRID.CELL_SIZE, 8 * GRID.CELL_SIZE - 8, COLOURS.accent1, 10, 'center');
    }

    function drawCranes() {
      // Top crane at grid (5, 2)
      const topCraneX = 5 * GRID.CELL_SIZE + GRID.CELL_SIZE / 2;
      const topCraneY = 2 * GRID.CELL_SIZE;

      drawRect(topCraneX - 15, topCraneY, 30, 60, COLOURS.craneMetal);
      drawRect(topCraneX - 12, topCraneY - 5, 24, 5, COLOURS.craneArm);

      for (let i = 0; i < gameState.topCrane.blocks; i++) {
        const blockColor = getBlockColor(i + 1);
        drawRect(topCraneX - 10, topCraneY - 10 - i * 7, 20, 6, blockColor);
      }

      // State indicator
      const topCraneStateColor = gameState.topCrane.transferState === 'LOADING' ? '#c4a574' : '#a8987f';
      drawText(gameState.topCrane.transferState, topCraneX, topCraneY + 70, topCraneStateColor, 8, 'center');

      // Bottom crane at grid (5, 8)
      const bottomCraneX = 5 * GRID.CELL_SIZE + GRID.CELL_SIZE / 2;
      const bottomCraneY = 8 * GRID.CELL_SIZE;

      drawRect(bottomCraneX - 15, bottomCraneY, 30, 60, COLOURS.craneMetal);
      drawRect(bottomCraneX - 12, bottomCraneY + 55, 24, 5, COLOURS.craneArm);

      for (let i = 0; i < gameState.bottomCrane.blocks; i++) {
        const blockColor = getBlockColor(i + 1);
        drawRect(bottomCraneX - 10, bottomCraneY + 10 + i * 7, 20, 6, blockColor);
      }

      // State indicator
      const bottomCraneStateColor = gameState.bottomCrane.transferState === 'UNLOADING' ? '#c4a574' : '#a8987f';
      drawText(gameState.bottomCrane.transferState, bottomCraneX, bottomCraneY - 10, bottomCraneStateColor, 8, 'center');
    }

    function drawTrain() {
      const waypoint = TRACK_WAYPOINTS[gameState.train.waypointIndex];
      const nextWaypoint = TRACK_WAYPOINTS[(gameState.train.waypointIndex + 1) % TRACK_WAYPOINTS.length];
      const pos = lerpGridPos(waypoint, nextWaypoint, gameState.train.waypointProgress);

      const trainX = pos.px + GRID.CELL_SIZE / 2;
      const trainY = pos.py + GRID.CELL_SIZE / 2;

      // Locomotive
      drawStrokedRect(trainX - 20, trainY - 10, 40, 20, COLOURS.trainBody, '#2a2a2a', 2);
      drawRect(trainX - 8, trainY - 6, 8, 12, COLOURS.trainDoor);
      drawCircle(trainX - 12, trainY + 8, 4, COLOURS.trainWheel);
      drawCircle(trainX + 12, trainY + 8, 4, COLOURS.trainWheel);

      // Cargo display on locomotive
      const totalCargo = getTotalTrainCargo();
      drawText(totalCargo, trainX, trainY - 18, COLOURS.accent1, 12, 'center');

      // Draw carriages following the train
      for (let i = 1; i <= CONFIG.CARRIAGE_COUNT; i++) {
        const carriage = gameState.train.carriages[i - 1];
        const carriageWaypoint = TRACK_WAYPOINTS[(gameState.train.waypointIndex - i + TRACK_WAYPOINTS.length) % TRACK_WAYPOINTS.length];
        const carriagePos = gridToPixels(carriageWaypoint.gx, carriageWaypoint.gy);

        const carriageX = carriagePos.px + GRID.CELL_SIZE / 2;
        const carriageY = carriagePos.py + GRID.CELL_SIZE / 2;

        // Carriage body
        drawStrokedRect(carriageX - 18, carriageY - 10, 36, 20, COLOURS.carriageBody, '#2a2a2a', 2);
        drawRect(carriageX - 6, carriageY - 6, 8, 12, COLOURS.carriageDoor);
        drawCircle(carriageX - 12, carriageY + 8, 4, COLOURS.trainWheel);
        drawCircle(carriageX + 12, carriageY + 8, 4, COLOURS.trainWheel);

        // Draw blocks in carriage
        for (let b = 0; b < carriage.blocks; b++) {
          const blockColor = getBlockColor(b + 1);
          const blockY = carriageY - 8 + (b % 2) * 6;
          const blockX = carriageX - 6 + (Math.floor(b / 2) * 8);
          drawRect(blockX, blockY, 6, 5, blockColor);
        }

        // Cargo count on carriage
        drawText(carriage.blocks, carriageX, carriageY - 18, COLOURS.accent2, 11, 'center');
      }

      gameState.train.x = trainX;
      gameState.train.y = trainY;
    }

    function drawTrucks() {
      gameState.trucks.forEach(truck => {
        const { px, py } = gridToPixels(truck.gx, truck.gy);

        drawStrokedRect(px - 8, py - 5, 16, 10, COLOURS.truckBody, '#3a2a1a', 1);
        drawRect(px - 6, py - 5, 6, 5, COLOURS.truckCab);
        drawCircle(px - 5, py + 5, 2.5, COLOURS.truckWheel);
        drawCircle(px + 5, py + 5, 2.5, COLOURS.truckWheel);

        if (truck.blocks > 0) {
          const blockColor = getBlockColor(truck.blocks);
          drawRect(px - 6, py - 12, 12, 4, blockColor);
          drawText(truck.blocks, px, py - 10, COLOURS.blockLevel3, 8, 'center');
        }

        // State label
        const stateLabel = truck.state.split('_')[0];
        drawText(stateLabel, px, py + 12, COLOURS.accent3, 7, 'center');
      });
    }

    // ===== GAME LOGIC =====
    function updateTrain() {
      const HALT_DURATION = 120;  // Longer halt time
      const SPEED = CONFIG.TRAIN_SPEED;

      switch (gameState.train.state) {
        case 'DOCKED_AT_TOP':
          if (gameState.train.haltCounter < HALT_DURATION) {
            gameState.train.haltCounter++;
            gameState.train.waypointProgress = 0;
          } else {
            gameState.train.state = 'DEPARTING_TOP';
            gameState.train.haltCounter = 0;
          }
          break;

        case 'DEPARTING_TOP':
          gameState.train.waypointProgress += SPEED;
          if (gameState.train.waypointProgress >= 1) {
            gameState.train.waypointProgress = 0;
            gameState.train.waypointIndex = (gameState.train.waypointIndex + 1) % TRACK_WAYPOINTS.length;
            if (gameState.train.waypointIndex > 5) {
              gameState.train.state = 'EN_ROUTE';
            }
          }
          break;

        case 'EN_ROUTE':
          gameState.train.waypointProgress += SPEED;
          if (gameState.train.waypointProgress >= 1) {
            gameState.train.waypointProgress = 0;
            gameState.train.waypointIndex = (gameState.train.waypointIndex + 1) % TRACK_WAYPOINTS.length;
            if (gameState.train.waypointIndex === STATIONS.bottom.waypointIndex) {
              gameState.train.state = 'DOCKED_AT_BOTTOM';
              gameState.train.haltCounter = 0;
            }
          }
          break;

        case 'DOCKED_AT_BOTTOM':
          if (gameState.train.haltCounter < HALT_DURATION) {
            gameState.train.haltCounter++;
            gameState.train.waypointProgress = 0;
          } else {
            gameState.train.state = 'DEPARTING_BOTTOM';
            gameState.train.haltCounter = 0;
          }
          break;

        case 'DEPARTING_BOTTOM':
          gameState.train.waypointProgress += SPEED;
          if (gameState.train.waypointProgress >= 1) {
            gameState.train.waypointProgress = 0;
            gameState.train.waypointIndex = (gameState.train.waypointIndex + 1) % TRACK_WAYPOINTS.length;
            if (gameState.train.waypointIndex < STATIONS.bottom.waypointIndex) {
              gameState.train.state = 'EN_ROUTE_BACK';
            }
          }
          break;

        case 'EN_ROUTE_BACK':
          gameState.train.waypointProgress += SPEED;
          if (gameState.train.waypointProgress >= 1) {
            gameState.train.waypointProgress = 0;
            gameState.train.waypointIndex = (gameState.train.waypointIndex + 1) % TRACK_WAYPOINTS.length;
            if (gameState.train.waypointIndex === STATIONS.top.waypointIndex) {
              gameState.train.state = 'DOCKED_AT_TOP';
              gameState.train.haltCounter = 0;
            }
          }
          break;
      }
    }

    function updateTrucks() {
      gameState.trucks.forEach(truck => {
        truck.waitTimer = Math.max(0, truck.waitTimer - 1);

        switch (truck.state) {
          case 'IDLE_AT_STATION':
            if (truck.waitTimer === 0) {
              const quarry = truck.station === 'top' ? gameState.topQuarry : gameState.bottomQuarry;
              const hasBlocks = quarry.some(b => b.height > 0);
              const crane = truck.station === 'top' ? gameState.topCrane : gameState.bottomCrane;
              const craneNotFull = crane.blocks < crane.maxStack;

              if (hasBlocks && craneNotFull) {
                truck.state = 'EN_ROUTE_TO_QUARRY';
                truck.pathIndex = 0;
                truck.currentPath = truck.station === 'top' ?
                  truckPaths.topStationToTopQuarry :
                  truckPaths.bottomStationToBottomQuarry;
              } else {
                truck.waitTimer = 30 + Math.random() * 40;
              }
            }
            break;

          case 'EN_ROUTE_TO_QUARRY':
            if (truck.pathIndex < truck.currentPath.length - 1) {
              const current = truck.currentPath[truck.pathIndex];
              const next = truck.currentPath[truck.pathIndex + 1];
              truck.pathProgress += CONFIG.TRUCK_SPEED;

              if (truck.pathProgress >= 1) {
                truck.pathProgress = 0;
                truck.pathIndex++;
                const wp = truck.currentPath[truck.pathIndex];
                truck.gx = wp.gx;
                truck.gy = wp.gy;
              } else {
                truck.gx = current.gx + (next.gx - current.gx) * truck.pathProgress;
                truck.gy = current.gy + (next.gy - current.gy) * truck.pathProgress;
              }
            } else {
              truck.state = 'PICKING_UP_BLOCK';
              truck.waitTimer = CONFIG.TRUCK_PICKUP_TIME;
            }
            break;

          case 'PICKING_UP_BLOCK':
            if (truck.waitTimer === 0) {
              const quarry = truck.station === 'top' ? gameState.topQuarry : gameState.bottomQuarry;
              const availableBlocks = quarry.filter(b => b.height > 0);

              if (availableBlocks.length > 0) {
                const block = availableBlocks[Math.floor(Math.random() * availableBlocks.length)];
                block.height = Math.max(0, block.height - 1);
                truck.blocks = CONFIG.BLOCKS_PER_TRUCK;
                truck.state = 'EN_ROUTE_TO_STATION';
                truck.pathIndex = 0;
                truck.pathProgress = 0;
                truck.currentPath = truck.station === 'top' ?
                  truckPaths.topQuarryToTopStation :
                  truckPaths.bottomQuarryToBottomStation;
                gameState.stats.blocksMoved++;
              } else {
                truck.state = 'IDLE_AT_STATION';
                truck.waitTimer = 20;
              }
            }
            break;

          case 'EN_ROUTE_TO_STATION':
            if (truck.pathIndex < truck.currentPath.length - 1) {
              const current = truck.currentPath[truck.pathIndex];
              const next = truck.currentPath[truck.pathIndex + 1];
              truck.pathProgress += CONFIG.TRUCK_SPEED;

              if (truck.pathProgress >= 1) {
                truck.pathProgress = 0;
                truck.pathIndex++;
                const wp = truck.currentPath[truck.pathIndex];
                truck.gx = wp.gx;
                truck.gy = wp.gy;
              } else {
                truck.gx = current.gx + (next.gx - current.gx) * truck.pathProgress;
                truck.gy = current.gy + (next.gy - current.gy) * truck.pathProgress;
              }
            } else {
              truck.state = 'DEPOSITING_AT_CRANE';
              truck.waitTimer = CONFIG.TRUCK_DROPOFF_TIME;
            }
            break;

          case 'DEPOSITING_AT_CRANE':
            if (truck.waitTimer === 0) {
              const crane = truck.station === 'top' ? gameState.topCrane : gameState.bottomCrane;

              if (truck.blocks > 0 && crane.blocks < crane.maxStack) {
                crane.blocks += truck.blocks;
                truck.blocks = 0;
              }

              truck.state = 'IDLE_AT_STATION';
              truck.waitTimer = 15 + Math.random() * 30;
              truck.gx = truck.station === 'top' ? 4 + Math.random() * 2 : 4 + Math.random() * 2;
              truck.gy = truck.station === 'top' ? 2 : 8;
              truck.pathProgress = 0;
            }
            break;
        }
      });
    }

    function updateCranes() {
      // Top crane loading into first available carriage
      if (gameState.train.state === 'DOCKED_AT_TOP' && gameState.topCrane.blocks > 0) {
        gameState.topCrane.transferTimer++;
        if (gameState.topCrane.transferTimer >= CONFIG.CRANE_TRANSFER_TIME) {
          gameState.topCrane.transferState = 'LOADING';
          gameState.topCrane.transferTimer = 0;

          for (let i = 0; i < CONFIG.CARRIAGE_COUNT; i++) {
            if (gameState.train.carriages[i].blocks < gameState.train.carriages[i].capacity && gameState.topCrane.blocks > 0) {
              gameState.train.carriages[i].blocks++;
              gameState.topCrane.blocks--;
              break;
            }
          }
        }
      } else {
        gameState.topCrane.transferState = 'IDLE';
        gameState.topCrane.transferTimer = 0;
      }

      // Bottom crane unloading (LIFO - last carriage first)
      if (gameState.train.state === 'DOCKED_AT_BOTTOM') {
        gameState.bottomCrane.transferTimer++;
        if (gameState.bottomCrane.transferTimer >= CONFIG.CRANE_TRANSFER_TIME) {
          gameState.bottomCrane.transferState = 'UNLOADING';
          gameState.bottomCrane.transferTimer = 0;

          for (let i = CONFIG.CARRIAGE_COUNT - 1; i >= 0; i--) {
            if (gameState.train.carriages[i].blocks > 0 && gameState.bottomCrane.blocks < gameState.bottomCrane.maxStack) {
              gameState.train.carriages[i].blocks--;
              gameState.bottomCrane.blocks++;
              break;
            }
          }
        }
      } else {
        gameState.bottomCrane.transferState = 'IDLE';
        gameState.bottomCrane.transferTimer = 0;
      }
    }

    function updateQuarryRates() {
      const currentTopCount = getTotalQuarryHeight(gameState.topQuarry);
      const currentBottomCount = getTotalQuarryHeight(gameState.bottomQuarry);

      gameState.stats.lastTopQuarryCount = currentTopCount;
      gameState.stats.lastBottomQuarryCount = currentBottomCount;
    }

    function checkReversal() {
      const topTotal = getTotalQuarryHeight(gameState.topQuarry);
      const bottomTotal = getTotalQuarryHeight(gameState.bottomQuarry);

      if (topTotal === 0 && bottomTotal > 200 && !gameState.isReversed) {
        gameState.isReversed = true;
        gameState.stats.reversalCount++;
        gameState.topQuarry.forEach(b => b.height = 0);
        gameState.bottomQuarry.forEach(b => b.height = 4 + Math.floor(Math.random() * 3));
      } else if (bottomTotal === 0 && topTotal > 200 && gameState.isReversed) {
        gameState.isReversed = false;
        gameState.stats.reversalCount++;
        gameState.topQuarry.forEach(b => b.height = 4 + Math.floor(Math.random() * 3));
        gameState.bottomQuarry.forEach(b => b.height = 0);
      }
    }

    // ===== GAME LOOP =====
    function update() {
      gameState.frameCount++;
      updateTrain();
      updateTrucks();
      updateCranes();
      updateQuarryRates();
      checkReversal();
    }

    function render() {
      ctx.fillStyle = COLOURS.canvas_bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawRoads();
      drawTrack();
      drawQuarries();
      drawStations();
      drawCranes();
      drawTrain();
      drawTrucks();
    }

    function updateUI() {
      gameState.uiUpdateCounter++;
      if (gameState.uiUpdateCounter < 10) return;
      gameState.uiUpdateCounter = 0;

      document.getElementById('trainStatus').textContent = gameState.train.state.replace(/_/g, ' ');
      document.getElementById('trainPosition').textContent = `WP ${gameState.train.waypointIndex}/${TRACK_WAYPOINTS.length}`;

      const totalCargo = getTotalTrainCargo();
      const maxCargo = CONFIG.CARRIAGE_COUNT * CONFIG.CARRIAGE_CAPACITY;
      document.getElementById('trainTotalCargo').textContent = `${totalCargo}/${maxCargo}`;

      // Update carriage info
      let carriagesHTML = '';
      gameState.train.carriages.forEach((c, i) => {
        carriagesHTML += `<div class="carriage-info">Car ${i + 1}: ${c.blocks}/${c.capacity}</div>`;
      });
      document.getElementById('carriagesList').innerHTML = carriagesHTML;

      // Quarry info
      const topCount = getTotalQuarryHeight(gameState.topQuarry);
      const bottomCount = getTotalQuarryHeight(gameState.bottomQuarry);
      const maxQuarryCapacity = CONFIG.QUARRY_GRID_WIDTH * CONFIG.QUARRY_GRID_HEIGHT * CONFIG.BLOCK_HEIGHT_LEVELS;

      document.getElementById('topQuarryBlocks').textContent = `${topCount}/${maxQuarryCapacity}`;
      document.getElementById('topQuarryBar').style.width = (topCount / maxQuarryCapacity * 100) + '%';
      document.getElementById('bottomQuarryBlocks').textContent = `${bottomCount}/${maxQuarryCapacity}`;
      document.getElementById('bottomQuarryBar').style.width = (bottomCount / maxQuarryCapacity * 100) + '%';

      // Crane info
      document.getElementById('topCraneBlocks').textContent = `${gameState.topCrane.blocks}/${gameState.topCrane.maxStack}`;
      document.getElementById('topCraneBar').style.width = (gameState.topCrane.blocks / gameState.topCrane.maxStack * 100) + '%';
      document.getElementById('topCraneState').textContent = gameState.topCrane.transferState;

      document.getElementById('bottomCraneBlocks').textContent = `${gameState.bottomCrane.blocks}/${gameState.bottomCrane.maxStack}`;
      document.getElementById('bottomCraneBar').style.width = (gameState.bottomCrane.blocks / gameState.bottomCrane.maxStack * 100) + '%';
      document.getElementById('bottomCraneState').textContent = gameState.bottomCrane.transferState;

      // Metrics
      document.getElementById('totalBlocksMoved').textContent = gameState.stats.blocksMoved;
      const throughput = gameState.frameCount > 0 ? Math.round((gameState.stats.blocksMoved / (gameState.frameCount / 1800)) * 60) : 0;
      document.getElementById('throughputRate').textContent = throughput + '/min';
      document.getElementById('reversalCount').textContent = gameState.stats.reversalCount;
    }

    function gameLoop() {
      update();
      render();
      updateUI();
      requestAnimationFrame(gameLoop);
    }

    // ===== INITIALIZATION & START =====
    buildTruckPaths();
    initializeQuarries();
    initializeTrucks();
    gameLoop();
  </script>
</body>
