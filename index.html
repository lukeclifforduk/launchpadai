<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launchpad — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #080808;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;

    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #a5b4fc;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 3rem;
    }

    .countdown {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .value {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: #fff;
    }

    .label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4b5563;
    }

    .separator {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      color: #2a2a2a;
      align-self: flex-start;
      padding-top: 0.1em;
      line-height: 1;
    }

    .done {
      font-size: 1.2rem;
      color: #a5b4fc;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Coming really soon</div>
    <h1>Launchpad</h1>
    <div class="countdown" id="countdown">
      <div class="unit"><span class="value" id="hours">12</span><span class="label">Hours</span></div>
      <div class="separator">:</div>
      <div class="unit"><span class="value" id="minutes">00</span><span class="label">Minutes</span></div>
      <div class="separator">:</div>
      <div class="unit"><span class="value" id="seconds">00</span><span class="label">Seconds</span></div>
    </div>
  </div>

  <script>
    const end = Date.now() + 24 * 60 * 60 * 1000;

    function pad(n) { return String(n).padStart(2, "0"); }

    function tick() {
      const remaining = end - Date.now();
      if (remaining <= 0) {
        document.getElementById("countdown").innerHTML = '<span class="done">Launching now</span>';
        return;
      }
      const h = Math.floor(remaining / 3600000);
      const m = Math.floor((remaining % 3600000) / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      document.getElementById("hours").textContent   = pad(h);
      document.getElementById("minutes").textContent = pad(m);
      document.getElementById("seconds").textContent = pad(s);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
